# -----------------------------------------------------------------------------
# Build & publish the multi-architecture image.
#
# Trigger: a Git version tag (e.g. `v1.2.0`).
# Result: an image pushed to the GitHub Container Registry (ghcr.io), for
# linux/amd64 AND linux/arm64 (Raspberry Pi, etc.).
#
# That is ALL it takes to "publish": tag, push, and the decentralized indexer
# does the rest (no review, no account to create).
# -----------------------------------------------------------------------------
name: Build and publish image

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag from Git tag
        id: meta
        run: |
          # v1.2.0 -> 1.2.0
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
